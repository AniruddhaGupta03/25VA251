<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drift: Cyberpunk Racing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Orbitron', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 700px;
            border: 3px solid #00f0ff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 
                0 0 50px rgba(0, 240, 255, 0.3),
                inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            position: absolute;
            background: rgba(0, 10, 20, 0.85);
            border: 1px solid #00f0ff;
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 13px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        #speedometer {
            bottom: 20px;
            right: 20px;
            width: 180px;
            text-align: center;
        }

        #speedValue {
            font-size: 42px;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
        }

        #speedUnit {
            font-size: 14px;
            color: #888;
        }

        #rpmBar {
            width: 100%;
            height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        #rpmFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #ffff00, #ff0044);
            border-radius: 3px;
            transition: width 0.1s;
        }

        #gearDisplay {
            position: absolute;
            bottom: 20px;
            right: 210px;
            font-size: 48px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }

        #positionPanel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }

        #positionDisplay {
            font-size: 28px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        #lapInfo {
            margin-top: 5px;
            color: #aaa;
            font-size: 12px;
        }

        #minimap {
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            padding: 5px;
        }

        #minimap canvas {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        #leaderboard {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 250px;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
        }

        .leaderboard-row.current {
            color: #00f0ff;
            font-weight: bold;
        }

        #boostBar {
            bottom: 20px;
            left: 20px;
            width: 200px;
        }

        .bar-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        #boostFill {
            width: 100%;
            height: 12px;
            background: #1a1a2e;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333;
        }

        #boostInner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff6600, #ffaa00);
            border-radius: 6px;
            transition: width 0.2s;
            box-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }

        #driftBar {
            bottom: 65px;
            left: 20px;
            width: 200px;
        }

        #driftFill {
            width: 100%;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
        }

        #driftInner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff00ff, #aa00ff);
            border-radius: 4px;
            transition: width 0.1s;
        }

        #driftMultiplier {
            position: absolute;
            bottom: 95px;
            left: 20px;
            font-size: 24px;
            font-weight: 900;
            color: #ff00ff;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }

        #timePanel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #currentTime {
            font-size: 24px;
            color: #fff;
            font-weight: 700;
        }

        #bestTime {
            font-size: 12px;
            color: #ffd700;
            margin-top: 2px;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 16, 0.95);
            z-index: 50;
            transition: opacity 0.5s;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-title {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(180deg, #00f0ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .game-subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .menu-btn {
            padding: 15px 50px;
            margin: 8px;
            font-size: 18px;
            font-family: 'Orbitron', monospace;
            background: transparent;
            border: 2px solid #00f0ff;
            color: #00f0ff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .menu-btn:hover {
            background: #00f0ff;
            color: #050510;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
            transform: scale(1.05);
        }

        .menu-btn.secondary {
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .menu-btn.secondary:hover {
            background: #ff00ff;
            color: #050510;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }

        .car-select {
            display: flex;
            gap: 30px;
            margin: 30px 0;
        }

        .car-option {
            width: 180px;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 20, 40, 0.5);
        }

        .car-option:hover {
            border-color: #00f0ff;
            transform: translateY(-5px);
        }

        .car-option.selected {
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .car-preview {
            width: 80px;
            height: 120px;
            margin: 0 auto 15px;
            position: relative;
        }

        .car-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .car-stats {
            font-size: 11px;
            color: #888;
            line-height: 1.8;
        }

        .stat-bar {
            width: 100%;
            height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            margin-top: 2px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 2px;
        }

        .track-select {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .track-option {
            width: 200px;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .track-option:hover, .track-option.selected {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }

        .track-name {
            font-size: 14px;
            color: #fff;
            margin-bottom: 5px;
        }

        .track-info {
            font-size: 11px;
            color: #888;
        }

        .controls-info {
            margin-top: 30px;
            color: #666;
            font-size: 13px;
            text-align: center;
            line-height: 2;
        }

        .controls-info span {
            color: #00f0ff;
            font-weight: bold;
        }

        /* Countdown */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.8);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
        }

        /* Messages */
        .game-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Weather overlay */
        #weatherOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .rain-drop {
            position: absolute;
            width: 1px;
            height: 15px;
            background: rgba(200, 200, 255, 0.4);
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            to { transform: translateY(720px); }
        }

        /* Results screen */
        #resultsScreen {
            display: none;
        }

        .results-table {
            width: 500px;
            margin: 20px 0;
        }

        .results-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 14px;
        }

        .results-row.header {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .results-row.winner {
            background: rgba(0, 240, 255, 0.1);
            border-left: 3px solid #00f0ff;
        }

        .results-row.you {
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid #ff00ff;
        }

        .medal {
            width: 24px;
            text-align: center;
        }

        /* Particles overlay */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <!-- Weather effects -->
        <div id="weatherOverlay"></div>

        <!-- HUD -->
        <div id="hud" style="display: none;">
            <div class="hud-panel" id="positionPanel">
                <div id="positionDisplay">1st</div>
                <div id="lapInfo">Lap 1 / 3</div>
            </div>

            <div class="hud-panel" id="leaderboard">
                <div class="leaderboard-row header">
                    <span>POS</span>
                    <span>NAME</span>
                    <span>TIME</span>
                </div>
                <div id="leaderboardContent"></div>
            </div>

            <div class="hud-panel" id="minimap">
                <canvas id="minimapCanvas" width="140" height="140"></canvas>
            </div>

            <div class="hud-panel" id="speedometer">
                <div id="speedValue">0</div>
                <div id="speedUnit">KM/H</div>
                <div id="rpmBar">
                    <div id="rpmFill"></div>
                </div>
            </div>

            <div id="gearDisplay">N</div>

            <div class="hud-panel" id="boostBar">
                <div class="bar-label">NITRO BOOST</div>
                <div id="boostFill">
                    <div id="boostInner"></div>
                </div>
            </div>

            <div class="hud-panel" id="driftBar">
                <div class="bar-label">DRIFT METER</div>
                <div id="driftFill">
                    <div id="driftInner"></div>
                </div>
            </div>

            <div id="driftMultiplier">×2.0</div>

            <div class="hud-panel" id="timePanel">
                <div id="currentTime">00:00.00</div>
                <div id="bestTime">BEST: --:--.--</div>
            </div>
        </div>

        <!-- Countdown -->
        <div id="countdown"></div>

        <!-- Game Messages -->
        <div class="game-message" id="gameMessage"></div>

        <!-- Start Screen -->
        <div class="screen" id="startScreen">
            <div class="game-title">NEON DRIFT</div>
            <div class="game-subtitle">CYBERPUNK RACING</div>
            <button class="menu-btn" id="btnQuickRace">QUICK RACE</button>
            <button class="menu-btn secondary" id="btnChampionship">CHAMPIONSHIP</button>
            <button class="menu-btn" id="btnTimeTrial">TIME TRIAL</button>
            <div class="controls-info">
                <span>ARROWS / WASD</span> — Drive &nbsp;&nbsp; <span>SPACE</span> — Handbrake/Drift<br>
                <span>SHIFT</span> — Nitro Boost &nbsp;&nbsp; <span>R</span> — Reset &nbsp;&nbsp; <span>P</span> — Pause
            </div>
        </div>

        <!-- Car Select Screen -->
        <div class="screen hidden" id="carSelectScreen">
            <div class="game-title" style="font-size: 36px;">SELECT YOUR RIDE</div>
            <div class="car-select" id="carSelectGrid">
                <!-- Generated by JS -->
            </div>
            <button class="menu-btn" id="btnSelectCar">SELECT</button>
            <button class="menu-btn secondary" id="btnBackToMenu">BACK</button>
        </div>

        <!-- Track Select Screen -->
        <div class="screen hidden" id="trackSelectScreen">
            <div class="game-title" style="font-size: 36px;">SELECT TRACK</div>
            <div class="track-select" id="trackSelectGrid">
                <!-- Generated by JS -->
            </div>
            <button class="menu-btn" id="btnStartRace">START RACE</button>
            <button class="menu-btn secondary" id="btnBackToCar">BACK</button>
        </div>

        <!-- Pause Screen -->
        <div class="screen hidden" id="pauseScreen">
            <div class="game-title" style="font-size: 48px;">PAUSED</div>
            <button class="menu-btn" id="btnResume">RESUME</button>
            <button class="menu-btn secondary" id="btnRestart">RESTART</button>
            <button class="menu-btn" id="btnQuitToMenu">QUIT TO MENU</button>
        </div>

        <!-- Results Screen -->
        <div class="screen hidden" id="resultsScreen">
            <div class="game-title" style="font-size: 42px;">RACE COMPLETE</div>
            <div id="resultsPosition" style="font-size: 28px; color: #ffd700; margin: 10px 0;"></div>
            <div class="results-table" id="resultsTable"></div>
            <button class="menu-btn" id="btnRaceAgain">RACE AGAIN</button>
            <button class="menu-btn secondary" id="btnResultsMenu">MAIN MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');

        // ==================== GAME CONFIG ====================
        const CARS = [
            {
                id: 'neon',
                name: 'NEON BLADE',
                color: '#00f0ff',
                accent: '#0088aa',
                speed: 0.85,
                acceleration: 0.9,
                handling: 0.95,
                boost: 0.8,
                drift: 0.9,
                description: 'Balanced all-rounder'
            },
            {
                id: 'phantom',
                name: 'PHANTOM GT',
                color: '#ff0044',
                accent: '#aa0022',
                speed: 0.95,
                acceleration: 0.85,
                handling: 0.75,
                boost: 0.9,
                drift: 0.7,
                description: 'High speed, low grip'
            },
            {
                id: 'volt',
                name: 'VOLT STRIKER',
                color: '#ffaa00',
                accent: '#aa6600',
                speed: 0.75,
                acceleration: 0.95,
                handling: 0.85,
                boost: 0.95,
                drift: 0.85,
                description: 'Lightning acceleration'
            },
            {
                id: 'spectre',
                name: 'SPECTRE X',
                color: '#aa00ff',
                accent: '#6600aa',
                speed: 0.8,
                acceleration: 0.8,
                handling: 0.9,
                boost: 0.85,
                drift: 0.95,
                description: 'Drift specialist'
            }
        ];

        const TRACKS = [
            {
                id: 'neon_city',
                name: 'NEON CITY',
                laps: 3,
                weather: 'clear',
                timeOfDay: 'night',
                difficulty: 'Easy',
                length: '2.4 km'
            },
            {
                id: 'storm_drain',
                name: 'STORM DRAIN',
                laps: 3,
                weather: 'rain',
                timeOfDay: 'evening',
                difficulty: 'Medium',
                length: '3.1 km'
            },
            {
                id: 'crystal_caverns',
                name: 'CRYSTAL CAVERNS',
                laps: 4,
                weather: 'clear',
                timeOfDay: 'dark',
                difficulty: 'Hard',
                length: '2.8 km'
            },
            {
                id: 'skyway',
                name: 'SKYWAY LOOP',
                laps: 3,
                weather: 'clear',
                timeOfDay: 'sunset',
                difficulty: 'Expert',
                length: '3.5 km'
            }
        ];

        const AI_NAMES = ['RYNEX', 'VORTEX', 'BLAZE', 'SHADOW', 'NOVA', 'PHANTOM', 'FROST', 'STRIKE'];

        // ==================== GAME STATE ====================
        let gameState = 'menu';
        let selectedCar = CARS[0];
        let selectedTrack = TRACKS[0];
        let raceMode = 'quick';

        // Track data
        let trackPoints = [];
        let trackWidth = 120;
        let trackLength = 0;
        let checkpoints = [];

        // Player
        let player = {
            x: 0, y: 0,
            angle: 0,
            speed: 0,
            maxSpeed: 12,
            acceleration: 0.15,
            friction: 0.98,
            turnSpeed: 0.06,
            gear: 0,
            rpm: 0,
            boost: 100,
            boostActive: false,
            driftAngle: 0,
            driftTime: 0,
            driftMultiplier: 1,
            lap: 1,
            checkpoint: 0,
            position: 1,
            finished: false,
            finishTime: 0,
            bestLap: Infinity,
            currentLapTime: 0,
            lapTimes: []
        };

        // AI opponents
        let opponents = [];

        // Camera
        let camera = { x: 0, y: 0, zoom: 1 };

        // Visual effects
        let particles = [];
        let skidMarks = [];
        let neonTrails = [];
        let screenShake = 0;

        // Race timing
        let raceStartTime = 0;
        let raceTime = 0;
        let countdownValue = 3;
        let countdownActive = false;

        // Input
        const keys = {};

        // ==================== TRACK GENERATION ====================
        function generateTrack(trackId) {
            trackPoints = [];
            checkpoints = [];
            
            const seed = trackId.length;
            
            if (trackId === 'neon_city') {
                // City circuit with tight corners
                const points = [
                    [200, 600], [200, 200], [400, 100], [600, 200],
                    [800, 200], [900, 350], [800, 500], [600, 550],
                    [500, 450], [400, 550], [300, 500]
                ];
                for (let i = 0; i < points.length; i++) {
                    const p0 = points[(i - 1 + points.length) % points.length];
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    const p3 = points[(i + 2) % points.length];
                    
                    for (let t = 0; t < 1; t += 0.05) {
                        const tt = t * t;
                        const ttt = tt * t;
                        const x = 0.5 * (
                            (2 * p1[0]) +
                            (-p0[0] + p2[0]) * t +
                            (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * tt +
                            (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * ttt
                        );
                        const y = 0.5 * (
                            (2 * p1[1]) +
                            (-p0[1] + p2[1]) * t +
                            (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * tt +
                            (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * ttt
                        );
                        trackPoints.push({ x, y });
                    }
                }
            } else if (trackId === 'storm_drain') {
                // Winding track
                for (let i = 0; i < 200; i++) {
                    const t = i / 200;
                    const angle = t * Math.PI * 4;
                    const r = 200 + Math.sin(t * Math.PI * 3) * 80;
                    trackPoints.push({
                        x: 500 + Math.cos(angle) * r + Math.sin(t * 10) * 30,
                        y: 350 + Math.sin(angle) * r * 0.6 + Math.cos(t * 8) * 40
                    });
                }
            } else if (trackId === 'crystal_caverns') {
                // Figure-8 with elevation feel
                for (let i = 0; i < 180; i++) {
                    const t = i / 180;
                    let x, y;
                    if (t < 0.5) {
                        const a = t * 2 * Math.PI * 2;
                        x = 300 + Math.cos(a) * 200;
                        y = 350 + Math.sin(a) * 150;
                    } else {
                        const a = (t - 0.5) * 2 * Math.PI * 2;
                        x = 700 + Math.cos(a + Math.PI) * 200;
                        y = 350 + Math.sin(a + Math.PI) * 150;
                    }
                    trackPoints.push({ x, y });
                }
            } else {
                // Skyway - large oval with variations
                for (let i = 0; i < 240; i++) {
                    const t = i / 240;
                    const angle = t * Math.PI * 2;
                    const r = 300 + Math.sin(angle * 3) * 50;
                    trackPoints.push({
                        x: 500 + Math.cos(angle) * r,
                        y: 350 + Math.sin(angle) * r * 0.7
                    });
                }
            }

            // Smooth track
            const smoothed = [];
            for (let i = 0; i < trackPoints.length; i++) {
                const prev = trackPoints[(i - 1 + trackPoints.length) % trackPoints.length];
                const curr = trackPoints[i];
                const next = trackPoints[(i + 1) % trackPoints.length];
                smoothed.push({
                    x: (prev.x + curr.x * 2 + next.x) / 4,
                    y: (prev.y + curr.y * 2 + next.y) / 4
                });
            }
            trackPoints = smoothed;

            // Calculate track length and checkpoints
            trackLength = 0;
            for (let i = 1; i < trackPoints.length; i++) {
                const dx = trackPoints[i].x - trackPoints[i-1].x;
                const dy = trackPoints[i].y - trackPoints[i-1].y;
                trackLength += Math.sqrt(dx * dx + dy * dy);
            }

            // Create checkpoints every ~10% of track
            const checkpointCount = 10;
            for (let i = 0; i < checkpointCount; i++) {
                const idx = Math.floor((i / checkpointCount) * trackPoints.length);
                checkpoints.push({
                    index: idx,
                    x: trackPoints[idx].x,
                    y: trackPoints[idx].y,
                    passed: false
                });
            }

            return trackPoints[0];
        }

        function getTrackPosition(t) {
            t = ((t % 1) + 1) % 1;
            const idx = t * (trackPoints.length - 1);
            const i = Math.floor(idx);
            const frac = idx - i;
            const p1 = trackPoints[i];
            const p2 = trackPoints[(i + 1) % trackPoints.length];
            return {
                x: p1.x + (p2.x - p1.x) * frac,
                y: p1.y + (p2.y - p1.y) * frac,
                angle: Math.atan2(p2.y - p1.y, p2.x - p1.x)
            };
        }

        function getClosestTrackPoint(x, y) {
            let minDist = Infinity;
            let closestT = 0;
            for (let i = 0; i < trackPoints.length; i++) {
                const dx = trackPoints[i].x - x;
                const dy = trackPoints[i].y - y;
                const dist = dx * dx + dy * dy;
                if (dist < minDist) {
                    minDist = dist;
                    closestT = i / trackPoints.length;
                }
            }
            return { t: closestT, dist: Math.sqrt(minDist) };
        }

        // ==================== INITIALIZATION ====================
        function initRace() {
            const startPos = generateTrack(selectedTrack.id);
            
            // Reset player
            player.x = startPos.x;
            player.y = startPos.y + 30;
            player.angle = getTrackPosition(0).angle;
            player.speed = 0;
            player.gear = 0;
            player.rpm = 0;
            player.boost = 100;
            player.boostActive = false;
            player.driftAngle = 0;
            player.driftTime = 0;
            player.driftMultiplier = 1;
            player.lap = 1;
            player.checkpoint = 0;
            player.position = 1;
            player.finished = false;
            player.finishTime = 0;
            player.bestLap = Infinity;
            player.currentLapTime = 0;
            player.lapTimes = [];

            // Create AI opponents
            opponents = [];
            const opponentColors = ['#ff4444', '#44ff44', '#ffff44', '#ff44ff', '#44ffff', '#ff8844', '#8844ff'];
            for (let i = 0; i < 7; i++) {
                const trackPos = getTrackPosition((i + 1) * 0.02);
                opponents.push({
                    x: trackPos.x + (i % 2 === 0 ? 20 : -20),
                    y: trackPos.y + (i + 1) * 25,
                    angle: trackPos.angle,
                    speed: 0,
                    maxSpeed: 10 + Math.random() * 3,
                    targetSpeed: 0,
                    color: opponentColors[i],
                    name: AI_NAMES[i],
                    lap: 1,
                    checkpoint: 0,
                    finished: false,
                    finishTime: 0,
                    currentLapTime: 0,
                    lapTimes: [],
                    skill: 0.7 + Math.random() * 0.3,
                    offset: (Math.random() - 0.5) * 40
                });
            }

            particles = [];
            skidMarks = [];
            neonTrails = [];
            screenShake = 0;
            raceTime = 0;

            // Reset checkpoints
            checkpoints.forEach(c => c.passed = false);

            // Start countdown
            countdownValue = 3;
            countdownActive = true;
            document.getElementById('countdown').style.opacity = '1';
            document.getElementById('countdown').textContent = '3';
            
            setTimeout(() => {
                countdownValue = 2;
                document.getElementById('countdown').textContent = '2';
            }, 1000);
            setTimeout(() => {
                countdownValue = 1;
                document.getElementById('countdown').textContent = '1';
            }, 2000);
            setTimeout(() => {
                countdownValue = 0;
                document.getElementById('countdown').textContent = 'GO!';
                document.getElementById('countdown').style.color = '#00ff88';
                raceStartTime = Date.now();
                countdownActive = false;
                setTimeout(() => {
                    document.getElementById('countdown').style.opacity = '0';
                    document.getElementById('countdown').style.color = '#00f0ff';
                }, 500);
            }, 3000);

            document.getElementById('hud').style.display = 'block';
            updateUI();
        }

        // ==================== UPDATE ====================
        function update() {
            if (gameState !== 'playing') return;

            if (countdownActive) return;

            raceTime = Date.now() - raceStartTime;
            player.currentLapTime = raceTime - (player.lapTimes.length > 0 ? 
                player.lapTimes.reduce((a, b) => a + b, 0) : 0);

            // Player input
            const accel = keys['arrowup'] || keys['w'];
            const brake = keys['arrowdown'] || keys['s'];
            const left = keys['arrowleft'] || keys['a'];
            const right = keys['arrowright'] || keys['d'];
            const handbrake = keys[' '];
            const boost = keys['shift'];

            // Track detection
            const trackInfo = getClosestTrackPoint(player.x, player.y);
            const onTrack = trackInfo.dist < trackWidth / 2;
            const offTrackPenalty = onTrack ? 1 : 0.6;

            // Acceleration
            const carAccel = selectedCar.acceleration;
            const carMaxSpeed = selectedCar.speed * 15;

            if (accel && !player.finished) {
                player.speed += player.acceleration * carAccel * offTrackPenalty;
                player.rpm = Math.min(8000, player.rpm + 200);
            } else {
                player.rpm = Math.max(0, player.rpm - 150);
            }

            if (brake) {
                player.speed -= 0.3;
                player.rpm = Math.max(0, player.rpm - 300);
            }

            // Friction
            player.speed *= player.friction;
            if (Math.abs(player.speed) < 0.01) player.speed = 0;

            // Max speed
            const currentMax = player.boostActive ? carMaxSpeed * 1.5 : carMaxSpeed;
            player.speed = Math.max(-currentMax * 0.3, Math.min(currentMax, player.speed));

            // Gear calculation
            const absSpeed = Math.abs(player.speed);
            if (absSpeed < 1) player.gear = 0;
            else if (absSpeed < 4) player.gear = 1;
            else if (absSpeed < 7) player.gear = 2;
            else if (absSpeed < 10) player.gear = 3;
            else if (absSpeed < 13) player.gear = 4;
            else player.gear = 5;

            // RPM based on gear
            if (player.gear > 0) {
                const gearRatio = absSpeed / (player.gear * 3);
                player.rpm = Math.min(8000, gearRatio * 6000 + 1000);
            }

            // Turning
            if (absSpeed > 0.1 && !player.finished) {
                const turnFactor = handbrake ? 1.5 : 1;
                const handling = selectedCar.handling;
                if (left) player.angle -= player.turnSpeed * turnFactor * handling * (absSpeed / 10 + 0.5);
                if (right) player.angle += player.turnSpeed * turnFactor * handling * (absSpeed / 10 + 0.5);
            }

            // Drift mechanics
            if (handbrake && absSpeed > 3) {
                player.driftAngle += (player.angle - player.driftAngle) * 0.1;
                player.driftTime++;
                player.speed *= 0.99;
                
                // Build drift multiplier
                if (player.driftTime > 30) {
                    player.driftMultiplier = Math.min(5, 1 + player.driftTime / 60);
                }

                // Skid marks
                if (Math.random() < 0.5) {
                    skidMarks.push({
                        x: player.x + Math.cos(player.angle + Math.PI/2) * 12,
                        y: player.y + Math.sin(player.angle + Math.PI/2) * 12,
                        life: 300,
                        opacity: 0.6
                    });
                    skidMarks.push({
                        x: player.x - Math.cos(player.angle + Math.PI/2) * 12,
                        y: player.y - Math.sin(player.angle + Math.PI/2) * 12,
                        life: 300,
                        opacity: 0.6
                    });
                }

                // Smoke particles
                if (Math.random() < 0.3) {
                    particles.push({
                        x: player.x,
                        y: player.y,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        life: 40,
                        size: Math.random() * 8 + 4,
                        color: 'rgba(200, 200, 200, 0.3)',
                        type: 'smoke'
                    });
                }
            } else {
                player.driftAngle = player.angle;
                if (player.driftTime > 30) {
                    // Score drift points
                    const driftPoints = Math.floor(player.driftTime * player.driftMultiplier);
                    if (driftPoints > 10) {
                        showMessage(`DRIFT +${driftPoints}`);
                    }
                }
                player.driftTime = 0;
                player.driftMultiplier = 1;
            }

            // Boost
            if (boost && player.boost > 0 && !player.finished) {
                player.boostActive = true;
                player.boost -= 0.5;
                player.speed += 0.1;

                // Boost particles
                for (let i = 0; i < 2; i++) {
                    particles.push({
                        x: player.x - Math.cos(player.angle) * 20,
                        y: player.y - Math.sin(player.angle) * 20,
                        vx: -Math.cos(player.angle) * 3 + (Math.random() - 0.5),
                        vy: -Math.sin(player.angle) * 3 + (Math.random() - 0.5),
                        life: 20,
                        size: Math.random() * 6 + 3,
                        color: `rgba(255, ${Math.floor(Math.random() * 100 + 100)}, 0, 0.8)`,
                        type: 'fire'
                    });
                }

                // Screen shake
                screenShake = 2;
            } else {
                player.boostActive = false;
                if (player.boost < 100) player.boost += 0.1;
            }

            // Neon trail
            if (absSpeed > 2) {
                neonTrails.push({
                    x: player.x,
                    y: player.y,
                    life: 20,
                    color: selectedCar.color
                });
            }

            // Position update
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;

            // Checkpoint detection
            for (let i = 0; i < checkpoints.length; i++) {
                const cp = checkpoints[i];
                const dist = Math.hypot(player.x - cp.x, player.y - cp.y);
                if (dist < 50 && !cp.passed) {
                    cp.passed = true;
                    // Check if all previous checkpoints passed
                    let allPassed = true;
                    for (let j = 0; j < i; j++) {
                        if (!checkpoints[j].passed) {
                            allPassed = false;
                            break;
                        }
                    }
                    if (allPassed) {
                        player.checkpoint = i;
                    }
                }
            }

            // Lap completion
            if (player.checkpoint >= checkpoints.length - 1) {
                const distToStart = Math.hypot(player.x - trackPoints[0].x, player.y - trackPoints[0].y);
                if (distToStart < 60) {
                    // Check all checkpoints passed
                    const allCp = checkpoints.every(c => c.passed);
                    if (allCp) {
                        player.lapTimes.push(player.currentLapTime);
                        if (player.currentLapTime < player.bestLap) {
                            player.bestLap = player.currentLapTime;
                        }
                        player.lap++;
                        player.checkpoint = 0;
                        checkpoints.forEach(c => c.passed = false);
                        
                        if (player.lap > selectedTrack.laps) {
                            player.finished = true;
                            player.finishTime = raceTime;
                            checkRaceEnd();
                        } else {
                            showMessage(`LAP ${player.lap - 1} COMPLETE`);
                        }
                    }
                }
            }

            // Opponent AI
            for (let opp of opponents) {
                if (opp.finished) continue;

                // Find target point on track ahead
                const oppTrack = getClosestTrackPoint(opp.x, opp.y);
                const targetT = ((oppTrack.t + 0.02) % 1 + 1) % 1;
                const target = getTrackPosition(targetT);
                
                // Target angle
                const targetAngle = Math.atan2(target.y - opp.y, target.x - opp.x);
                
                // Smooth turn
                let angleDiff = targetAngle - opp.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                opp.angle += angleDiff * 0.05 * opp.skill;

                // Speed control
                const curveAhead = Math.abs(angleDiff);
                opp.targetSpeed = opp.maxSpeed * (1 - curveAhead * 0.5) * opp.skill;
                if (opp.speed < opp.targetSpeed) {
                    opp.speed += 0.1;
                } else {
                    opp.speed -= 0.05;
                }

                // Move
                opp.x += Math.cos(opp.angle) * opp.speed;
                opp.y += Math.sin(opp.angle) * opp.speed;

                // Lap logic
                const oppDist = Math.hypot(opp.x - trackPoints[0].x, opp.y - trackPoints[0].y);
                if (oppDist < 60 && opp.speed > 1) {
                    opp.currentLapTime = raceTime - (opp.lapTimes.length > 0 ? 
                        opp.lapTimes.reduce((a, b) => a + b, 0) : 0);
                    opp.lapTimes.push(opp.currentLapTime);
                    opp.lap++;
                    if (opp.lap > selectedTrack.laps) {
                        opp.finished = true;
                        opp.finishTime = raceTime;
                    }
                }
            }

            // Calculate positions
            const allRacers = [
                { ...player, isPlayer: true, progress: player.lap + player.checkpoint / checkpoints.length },
                ...opponents.map(o => ({ ...o, isPlayer: false, progress: o.lap + (o.checkpoint || 0) / checkpoints.length }))
            ];
            allRacers.sort((a, b) => b.progress - a.progress);
            
            for (let i = 0; i < allRacers.length; i++) {
                if (allRacers[i].isPlayer) {
                    player.position = i + 1;
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Skid marks
            for (let i = skidMarks.length - 1; i >= 0; i--) {
                skidMarks[i].life--;
                skidMarks[i].opacity -= 0.002;
                if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
            }

            // Neon trails
            for (let i = neonTrails.length - 1; i >= 0; i--) {
                neonTrails[i].life--;
                if (neonTrails[i].life <= 0) neonTrails.splice(i, 1);
            }

            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;
            if (screenShake < 0.1) screenShake = 0;

            // Camera follow
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            updateUI();
        }

        function checkRaceEnd() {
            const allFinished = player.finished && opponents.every(o => o.finished);
            if (allFinished) {
                setTimeout(() => {
                    showResults();
                }, 2000);
            }
        }

        function showResults() {
            gameState = 'results';
            document.getElementById('hud').style.display = 'none';
            
            const allRacers = [
                { name: 'YOU', time: player.finishTime, isPlayer: true, color: selectedCar.color },
                ...opponents.filter(o => o.finished).map(o => ({
                    name: o.name,
                    time: o.finishTime,
                    isPlayer: false,
                    color: o.color
                }))
            ];
            allRacers.sort((a, b) => a.time - b.time);

            const resultsTable = document.getElementById('resultsTable');
            resultsTable.innerHTML = `
                <div class="results-row header">
                    <span>POS</span>
                    <span>DRIVER</span>
                    <span>TIME</span>
                </div>
            `;

            allRacers.forEach((racer, i) => {
                const row = document.createElement('div');
                row.className = 'results-row';
                if (i === 0) row.classList.add('winner');
                if (racer.isPlayer) row.classList.add('you');
                
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}th`;
                const timeStr = formatTime(racer.time);
                
                row.innerHTML = `
                    <span class="medal">${medal}</span>
                    <span>${racer.name}</span>
                    <span style="color: ${racer.color}">${timeStr}</span>
                `;
                resultsTable.appendChild(row);
            });

            const playerPos = allRacers.findIndex(r => r.isPlayer) + 1;
            document.getElementById('resultsPosition').textContent = 
                playerPos === 1 ? 'VICTORY!' : 
                playerPos === 2 ? '2nd PLACE' : 
                playerPos === 3 ? '3rd PLACE' : `${playerPos}th PLACE`;

            document.getElementById('resultsScreen').style.display = 'flex';
            document.getElementById('resultsScreen').classList.remove('hidden');
        }

        // ==================== DRAWING ====================
        function draw() {
            ctx.save();

            // Screen shake
            if (screenShake > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake * 2,
                    (Math.random() - 0.5) * screenShake * 2
                );
            }

            // Camera
            ctx.translate(-camera.x, -camera.y);

            // Background
            const bgGradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, 800
            );
            bgGradient.addColorStop(0, '#0a0a1a');
            bgGradient.addColorStop(1, '#050510');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(camera.x, camera.y, canvas.width, canvas.height);

            // Grid pattern (cyberpunk feel)
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridOffsetX = -camera.x % 50;
            const gridOffsetY = -camera.y % 50;
            for (let x = camera.x - 50; x < camera.x + canvas.width + 50; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, camera.y);
                ctx.lineTo(x, camera.y + canvas.height);
                ctx.stroke();
            }
            for (let y = camera.y - 50; y < camera.y + canvas.height + 50; y += 50) {
                ctx.beginPath();
                ctx.moveTo(camera.x, y);
                ctx.lineTo(camera.x + canvas.width, y);
                ctx.stroke();
            }

            // Track
            if (trackPoints.length > 0) {
                // Track surface
                ctx.beginPath();
                ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
                for (let i = 1; i < trackPoints.length; i++) {
                    ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = trackWidth;
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // Track border (neon)
                ctx.beginPath();
                ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
                for (let i = 1; i < trackPoints.length; i++) {
                    ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = trackWidth + 8;
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // Inner edge
                ctx.beginPath();
                ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
                for (let i = 1; i < trackPoints.length; i++) {
                    ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = trackWidth - 20;
                ctx.strokeStyle = '#0f0f1a';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // Center line
                ctx.setLineDash([20, 20]);
                ctx.beginPath();
                ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
                for (let i = 1; i < trackPoints.length; i++) {
                    ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
                }
                ctx.closePath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.setLineDash([]);

                // Checkpoints
                checkpoints.forEach((cp, i) => {
                    const alpha = cp.passed ? 0.3 : 0.8;
                    ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(cp.x, cp.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = `rgba(0, 255, 136, ${alpha})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(cp.x, cp.y, 12, 0, Math.PI * 2);
                    ctx.stroke();
                });

                // Start/finish line
                const start = trackPoints[0];
                const startAngle = getTrackPosition(0).angle + Math.PI / 2;
                ctx.save();
                ctx.translate(start.x, start.y);
                ctx.rotate(startAngle);
                for (let i = -3; i < 3; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#fff' : '#000';
                    ctx.fillRect(i * 10, -trackWidth/2, 10, trackWidth);
                }
                ctx.restore();
            }

            // Skid marks
            skidMarks.forEach(mark => {
                ctx.fillStyle = `rgba(30, 30, 40, ${mark.opacity})`;
                ctx.beginPath();
                ctx.arc(mark.x, mark.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Neon trails
            neonTrails.forEach((trail, i) => {
                const alpha = trail.life / 20;
                ctx.fillStyle = trail.color.replace(')', `, ${alpha * 0.5})`).replace('rgb', 'rgba');
                ctx.beginPath();
                ctx.arc(trail.x, trail.y, 3 * alpha, 0, Math.PI * 2);
                ctx.fill();
            });

            // Opponents
            opponents.forEach(opp => {
                drawCar(opp.x, opp.y, opp.angle, opp.color, '#000', false, opp.name);
            });

            // Player
            const driftVisual = player.driftTime > 10 ? player.driftAngle : player.angle;
            drawCar(player.x, player.y, driftVisual, selectedCar.color, selectedCar.accent, true, 'YOU');

            // Particles
            particles.forEach(p => {
                const alpha = p.life / (p.type === 'smoke' ? 40 : 20);
                ctx.fillStyle = p.color.replace(/[\d.]+\)$/, `${alpha})`);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            });

            // Headlights effect
            if (selectedTrack.timeOfDay === 'night' || selectedTrack.timeOfDay === 'dark') {
                const lightLength = 150;
                const lightWidth = 40;
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                
                const lightGradient = ctx.createRadialGradient(20, 0, 0, lightLength, 0, lightWidth);
                lightGradient.addColorStop(0, 'rgba(255, 255, 200, 0.4)');
                lightGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
                ctx.fillStyle = lightGradient;
                ctx.beginPath();
                ctx.moveTo(15, -8);
                ctx.lineTo(lightLength, -lightWidth);
                ctx.lineTo(lightLength, lightWidth);
                ctx.lineTo(15, 8);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            ctx.restore();

            // Minimap
            drawMinimap();
        }

        function drawCar(x, y, angle, color, accent, isPlayer, name) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.ellipse(2, 2, 22, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // Car body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-10, -10);
            ctx.lineTo(-18, -8);
            ctx.lineTo(-18, 8);
            ctx.lineTo(-10, 10);
            ctx.closePath();
            ctx.fill();

            // Accent
            ctx.fillStyle = accent;
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-5, -6);
            ctx.lineTo(-5, 6);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#0a0a1a';
            ctx.beginPath();
            ctx.ellipse(-5, 0, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Neon underglow
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(-15, -9);
            ctx.lineTo(-15, 9);
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Rear lights
            ctx.fillStyle = '#ff0044';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0044';
            ctx.fillRect(-19, -7, 3, 4);
            ctx.fillRect(-19, 3, 3, 4);
            ctx.shadowBlur = 0;

            // Headlights
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff';
            ctx.fillRect(18, -6, 4, 3);
            ctx.fillRect(18, 3, 4, 3);
            ctx.shadowBlur = 0;

            ctx.restore();

            // Name tag
            if (!isPlayer) {
                ctx.fillStyle = '#fff';
                ctx.font = '10px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText(name, x, y - 25);
            }

            // Invincibility flash
            if (isPlayer && player.invincible && Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawMinimap() {
            minimapCtx.fillStyle = '#0a0a1a';
            minimapCtx.fillRect(0, 0, 140, 140);

            // Track
            if (trackPoints.length > 0) {
                const minX = Math.min(...trackPoints.map(p => p.x));
                const maxX = Math.max(...trackPoints.map(p => p.x));
                const minY = Math.min(...trackPoints.map(p => p.y));
                const maxY = Math.max(...trackPoints.map(p => p.y));
                const scale = Math.min(130 / (maxX - minX), 130 / (maxY - minY)) * 0.9;
                const offsetX = (140 - (maxX - minX) * scale) / 2 - minX * scale;
                const offsetY = (140 - (maxY - minY) * scale) / 2 - minY * scale;

                const transform = (p) => ({
                    x: p.x * scale + offsetX,
                    y: p.y * scale + offsetY
                });

                // Track line
                minimapCtx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
                minimapCtx.lineWidth = 3;
                minimapCtx.beginPath();
                const first = transform(trackPoints[0]);
                minimapCtx.moveTo(first.x, first.y);
                for (let i = 1; i < trackPoints.length; i++) {
                    const pt = transform(trackPoints[i]);
                    minimapCtx.lineTo(pt.x, pt.y);
                }
                minimapCtx.closePath();
                minimapCtx.stroke();

                // Opponents
                opponents.forEach(opp => {
                    const pos = transform(opp);
                    minimapCtx.fillStyle = opp.color;
                    minimapCtx.beginPath();
                    minimapCtx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
                    minimapCtx.fill();
                });

                // Player
                const playerPos = transform(player);
                minimapCtx.fillStyle = '#fff';
                minimapCtx.beginPath();
                minimapCtx.arc(playerPos.x, playerPos.y, 4, 0, Math.PI * 2);
                minimapCtx.fill();
                minimapCtx.strokeStyle = selectedCar.color;
                minimapCtx.lineWidth = 2;
                minimapCtx.stroke();
            }
        }

        // ==================== UI UPDATES ====================
        function updateUI() {
            // Speed
            const speedKmh = Math.abs(player.speed) * 15;
            document.getElementById('speedValue').textContent = Math.floor(speedKmh);
            
            // RPM
            const rpmPercent = (player.rpm / 8000) * 100;
            document.getElementById('rpmFill').style.width = rpmPercent + '%';
            
            // Gear
            const gearText = player.gear === 0 ? 'N' : player.gear === 5 ? 'R' : player.gear;
            document.getElementById('gearDisplay').textContent = gearText;
            
            // Boost
            document.getElementById('boostInner').style.width = player.boost + '%';
            
            // Drift
            const driftPercent = Math.min(100, player.driftTime / 3);
            document.getElementById('driftInner').style.width = driftPercent + '%';
            
            // Drift multiplier
            const driftMult = document.getElementById('driftMultiplier');
            if (player.driftMultiplier > 1.5) {
                driftMult.textContent = `×${player.driftMultiplier.toFixed(1)}`;
                driftMult.style.opacity = '1';
            } else {
                driftMult.style.opacity = '0';
            }
            
            // Position
            const posSuffix = player.position === 1 ? 'st' : player.position === 2 ? 'nd' : player.position === 3 ? 'rd' : 'th';
            document.getElementById('positionDisplay').textContent = `${player.position}${posSuffix}`;
            document.getElementById('lapInfo').textContent = `Lap ${Math.min(player.lap, selectedTrack.laps)} / ${selectedTrack.laps}`;
            
            // Time
            document.getElementById('currentTime').textContent = formatTime(raceTime);
            document.getElementById('bestTime').textContent = player.bestLap < Infinity ? 
                `BEST: ${formatTime(player.bestLap)}` : 'BEST: --:--.--';
            
            // Leaderboard
            const allRacers = [
                { name: 'YOU', lap: player.lap, checkpoint: player.checkpoint, finished: player.finished, time: player.finishTime, isPlayer: true },
                ...opponents.map(o => ({ name: o.name, lap: o.lap, checkpoint: o.checkpoint || 0, finished: o.finished, time: o.finishTime, isPlayer: false }))
            ];
            allRacers.sort((a, b) => {
                if (a.finished && !b.finished) return -1;
                if (!a.finished && b.finished) return 1;
                if (a.finished && b.finished) return a.time - b.time;
                return (b.lap + b.checkpoint / 10) - (a.lap + a.checkpoint / 10);
            });
            
            const lbContent = document.getElementById('leaderboardContent');
            lbContent.innerHTML = '';
            allRacers.slice(0, 5).forEach((racer, i) => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row' + (racer.isPlayer ? ' current' : '');
                const timeStr = racer.finished ? formatTime(racer.time) : formatTime(raceTime);
                row.innerHTML = `
                    <span>${i + 1}</span>
                    <span>${racer.name}</span>
                    <span>${timeStr}</span>
                `;
                lbContent.appendChild(row);
            });
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const centis = Math.floor((ms % 1000) / 10);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centis.toString().padStart(2, '0')}`;
        }

        function showMessage(text) {
            const msg = document.getElementById('gameMessage');
            msg.textContent = text;
            msg.style.opacity = '1';
            msg.style.transform = 'translateX(-50%) scale(1.2)';
            setTimeout(() => {
                msg.style.opacity = '0';
                msg.style.transform = 'translateX(-50%) scale(1)';
            }, 1500);
        }

        // ==================== WEATHER ====================
        function setWeather(type) {
            const overlay = document.getElementById('weatherOverlay');
            overlay.innerHTML = '';
            
            if (type === 'rain') {
                for (let i = 0; i < 100; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (Math.random() * 0.5 + 0.3) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    overlay.appendChild(drop);
                }
            }
        }

        // ==================== MENU SYSTEM ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                if (s.id === screenId) {
                    s.classList.remove('hidden');
                    s.style.display = 'flex';
                } else {
                    s.classList.add('hidden');
                    s.style.display = 'none';
                }
            });
        }

        // Generate car select UI
        function generateCarSelect() {
            const grid = document.getElementById('carSelectGrid');
            grid.innerHTML = '';
            CARS.forEach((car, i) => {
                const div = document.createElement('div');
                div.className = 'car-option' + (i === 0 ? ' selected' : '');
                div.dataset.index = i;
                div.innerHTML = `
                    <div class="car-preview">
                        <canvas id="carPreview${i}" width="80" height="120"></canvas>
                    </div>
                    <div class="car-name">${car.name}</div>
                    <div class="car-stats">
                        SPEED<div class="stat-bar"><div class="stat-bar-fill" style="width:${car.speed*100}%;background:${car.color}"></div></div>
                        ACCEL<div class="stat-bar"><div class="stat-bar-fill" style="width:${car.acceleration*100}%;background:${car.color}"></div></div>
                        HANDLING<div class="stat-bar"><div class="stat-bar-fill" style="width:${car.handling*100}%;background:${car.color}"></div></div>
                        BOOST<div class="stat-bar"><div class="stat-bar-fill" style="width:${car.boost*100}%;background:${car.color}"></div></div>
                        DRIFT<div class="stat-bar"><div class="stat-bar-fill" style="width:${car.drift*100}%;background:${car.color}"></div></div>
                    </div>
                    <div style="margin-top:8px;font-size:11px;color:#888;">${car.description}</div>
                `;
                div.addEventListener('click', () => {
                    document.querySelectorAll('.car-option').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedCar = car;
                });
                grid.appendChild(div);

                // Draw preview
                setTimeout(() => {
                    const previewCanvas = document.getElementById(`carPreview${i}`);
                    if (previewCanvas) {
                        const pctx = previewCanvas.getContext('2d');
                        pctx.translate(40, 60);
                        pctx.rotate(-Math.PI / 2);
                        
                        // Simple car preview
                        pctx.fillStyle = car.color;
                        pctx.beginPath();
                        pctx.moveTo(25, 0);
                        pctx.lineTo(-15, -10);
                        pctx.lineTo(-20, -7);
                        pctx.lineTo(-20, 7);
                        pctx.lineTo(-15, 10);
                        pctx.closePath();
                        pctx.fill();
                        
                        pctx.fillStyle = car.accent;
                        pctx.beginPath();
                        pctx.moveTo(15, 0);
                        pctx.lineTo(-5, -5);
                        pctx.lineTo(-5, 5);
                        pctx.closePath();
                        pctx.fill();
                    }
                }, 0);
            });
        }

        // Generate track select UI
        function generateTrackSelect() {
            const grid = document.getElementById('trackSelectGrid');
            grid.innerHTML = '';
            TRACKS.forEach((track, i) => {
                const div = document.createElement('div');
                div.className = 'track-option' + (i === 0 ? ' selected' : '');
                div.dataset.index = i;
                
                const weatherIcon = track.weather === 'rain' ? '🌧️' : '☀️';
                const timeIcon = track.timeOfDay === 'night' ? '🌙' : track.timeOfDay === 'sunset' ? '🌅' : '🌑';
                
                div.innerHTML = `
                    <div class="track-name">${track.name}</div>
                    <div class="track-info">
                        ${weatherIcon} ${timeIcon}<br>
                        ${track.length} | ${track.laps} Laps<br>
                        Difficulty: ${track.difficulty}
                    </div>
                `;
                div.addEventListener('click', () => {
                    document.querySelectorAll('.track-option').forEach(t => t.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedTrack = track;
                });
                grid.appendChild(div);
            });
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
            
            if (e.key.toLowerCase() === 'p' && gameState === 'playing') {
                gameState = 'paused';
                showScreen('pauseScreen');
            } else if (e.key.toLowerCase() === 'p' && gameState === 'paused') {
                gameState = 'playing';
                showScreen('none');
                document.getElementById('pauseScreen').style.display = 'none';
            }
            
            if (e.key.toLowerCase() === 'r' && gameState === 'playing') {
                initRace();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Menu buttons
        document.getElementById('btnQuickRace').addEventListener('click', () => {
            raceMode = 'quick';
            generateCarSelect();
            showScreen('carSelectScreen');
        });

        document.getElementById('btnChampionship').addEventListener('click', () => {
            raceMode = 'championship';
            generateCarSelect();
            showScreen('carSelectScreen');
        });

        document.getElementById('btnTimeTrial').addEventListener('click', () => {
            raceMode = 'timetrial';
            generateCarSelect();
            showScreen('carSelectScreen');
        });

        document.getElementById('btnSelectCar').addEventListener('click', () => {
            generateTrackSelect();
            showScreen('trackSelectScreen');
        });

        document.getElementById('btnBackToMenu').addEventListener('click', () => {
            showScreen('startScreen');
        });

        document.getElementById('btnBackToCar').addEventListener('click', () => {
            showScreen('carSelectScreen');
        });

        document.getElementById('btnStartRace').addEventListener('click', () => {
            showScreen('none');
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('carSelectScreen').style.display = 'none';
            document.getElementById('trackSelectScreen').style.display = 'none';
            setWeather(selectedTrack.weather);
            gameState = 'playing';
            initRace();
        });

        document.getElementById('btnResume').addEventListener('click', () => {
            gameState = 'playing';
            showScreen('none');
            document.getElementById('pauseScreen').style.display = 'none';
        });

        document.getElementById('btnRestart').addEventListener('click', () => {
            gameState = 'playing';
            showScreen('none');
            document.getElementById('pauseScreen').style.display = 'none';
            initRace();
        });

        document.getElementById('btnQuitToMenu').addEventListener('click', () => {
            gameState = 'menu';
            showScreen('startScreen');
            document.getElementById('hud').style.display = 'none';
        });

        document.getElementById('btnRaceAgain').addEventListener('click', () => {
            document.getElementById('resultsScreen').style.display = 'none';
            initRace();
            gameState = 'playing';
        });

        document.getElementById('btnResultsMenu').addEventListener('click', () => {
            gameState = 'menu';
            showScreen('startScreen');
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
        });

        // ==================== GAME LOOP ====================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        gameLoop();
    </script>
</body>
</html>
