<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: cyan; color: yellow; text-align: center;">
    <div style="text-align: center ; border: 1px solid black;">
        <h1>factorial calculator</h1>
    <input id="n" type="number" placeholder="enter no. to find factorial"><br>
    <button onclick="fact()"> result</button>
    <p id="result" style=" color : red;"></p>
    </div>
    <script>    
        function fact(){
            let n = Number(document.getElementById("n").value);
            let f = 1;
            for(let i=1; i<=n; i++){
                f *= i;
            }
            document.getElementById("result").innerHTML = "Factorial of " + n + " is " + f;
        }
    </script>    
</body>
</html>
