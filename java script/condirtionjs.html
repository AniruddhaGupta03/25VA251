<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> conditional statements Document</title>
</head>
<body>
    <script>
        //conditional statements:used to perform different actions based on different
        //  conditionsto perform different actions based on different conditions, 
        // controlling the flow of a program. 

        let age=33;

        /*if(age>=18){
            console.log("you are eligible for voting");
        }
        */

        //if ...else
        if(age>=18){
            console.log("you are eligible for voting");
        }
        else{
            console.log("you are not eligible for voting");
        }
        let grade='A';
        switch(grade){
            case 'A':result="First division";
            break;
            case'B':result="Second division";
            break;
            case 'C':result="Third division";
            break;
            default:result="fail";
        }
        console.log(result);
        //if else if else ......
        let marks=55;
        if(marks>=60){
            console.log("first division marks");
        }
        else if(marks<=60&&marks>=40){
            console.log("second division marks");
        }
        else if(marks<40&&marks>=33){
            console.log("third division marks");
        }
        else{
            console.log("fail");
        }

        let arr=[95,67,87,88,90];
        let sum=0;
        for (let y of arr){
            sum+=y;
        } 
        let avg=sum/arr.length;
        console.log(avg);

        if(avg>=90){
            console.log("grade A");
        }
        else if(avg>=80&&avg<90){
            console.log("grade B");
        }
        else if(avg>=70&&avg<80){
            console.log("grade c");
        }
        else if(avg>=60&&avg<70){
        console.log("grade D");
        }
        else if(avg>=50&&avg<60){
            console.log("grade E");
        }
        else{
            console.log("grade F");
        }

    </script>
    
</body>
</html>
