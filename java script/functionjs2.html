<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Practice</title>
</head>
<body>
<script>
    // Promise example
    let mypromises = new Promise(function(resolve, reject) {
        let age = 25;

        if (age >= 18) {
            resolve("valid age");
        } else {
            reject("wait for next year");
        }
    });

    mypromises
        .then(result => console.log(result))
        .catch(error => console.log(error))
        .finally(() => console.log("done"));


    // Async/Await + Fetch API
    async function userData() {
        try {
            // Correct endpoint (returns proper data)
            let response = await fetch('https://dummyjson.com/products');
            
            if (!response.ok) {
                throw new Error("Network response was not ok");
            }

            let responseData = await response.json();
            console.log("API Data:", responseData);

        } catch (error) {
            console.log("Error:", error);
        }
    }

    userData();


    // Map function
    let num = [3, 4, 6, 7];
    let square = num.map(n => n * 2);
    console.log(square);


    // Reduce function
    let sum = num.reduce((total, n) => total + n, 0);
    console.log(sum);
    //IIFE (Immediately Invoked Function Expression)
    (function() {
        console.log("welcome to IIFE");
    })();


    (msg=>console.log("hello js"))();

    //local storage

    let userinfo ={
        name:"aniruddha",
        age:19,
        mob:235434351,
        email:"jhon@gmail.com"
    };
    localStorage.setItem("userinfo", JSON.stringify(userinfo));

    const saveuser=JSON.parse(localStorage.getItem("userinfo"));
    console.log(saveuser);


    

</script>

</body>
</html>
