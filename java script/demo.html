<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>java script</h1>
    <script>
        //variable declaration
        var myName="Aniruddha";//global attach with window object
        document.write(myName);
        console.log(myName);
        //js execution (global and local(block) scope)
        function hello(){
            var mynum=5311361313;
            console.log(mynum);
        }
        hello();
        //let and const
        let msg="welcome";
        console.log(msg);
        
        const msg2="thanks";
        console.log(msg2);

    </script>
    
</body>
</html>
