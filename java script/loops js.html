<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <script>
        //loops :used to execute a block of code repeatedly until a specific condition is met

        //for loop used when you know no. of iteration in advance

        let studentlist=["anirudddha","manan","shaurya","amol"];

        for (let i=0;i<studentlist.length;i++){
            console.log(studentlist[i]);
        }

            //while

            let x=0;
            while(x<studentlist.length){
            console.log(studentlist[x]);
            x++;
        }


        for (let y of studentlist){
            console.log(y);
        }
    </script>
    
</body>
